<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Flowchart App</title>
        <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }
            html, body {
                height: 100%;
                overflow: hidden;
                font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            }

            /* ===== レイアウト骨格 ===== */
            body {
                display: flex;
                flex-direction: column;
            }

            /* 上部ツールバー */
            #toolbar {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 5px 10px;
                background: #f4f5f7;
                border-bottom: 1px solid #d0d3da;
                flex-shrink: 0;
                flex-wrap: wrap;
                z-index: 10;
            }

            /* ツールバー以下の横並びエリア */
            #main-area {
                display: flex;
                flex: 1;
                overflow: hidden;
            }

            /* ===== 左サイドパネル ===== */
            #side-panel-wrapper {
                display: flex;
                flex-shrink: 0;
                position: relative;
            }
            #side-panel {
                width: 72px;
                min-width: 0px;
                max-width: 300px;
                background: #f4f5f7;
                display: grid;
                grid-template-columns: repeat(1, 1fr);
                align-content: start;
                padding: 10px 4px 16px;
                gap: 4px;
                overflow-y: auto;
                overflow-x: hidden;
                user-select: none;
                transition: none;
            }
            /* パネルが折りたたまれているとき */
            #side-panel.collapsed {
                width: 0 !important;
                padding: 0;
                overflow: hidden;
            }
            .panel-section-label {
                grid-column: 1 / -1;
                font-size: 9px;
                font-weight: 600;
                letter-spacing: 0.06em;
                color: #888;
                text-transform: uppercase;
                padding: 8px 0 4px;
                width: 100%;
                text-align: center;
            }
            .panel-section-label:first-child {
                padding-top: 0;
            }

            /* リサイズハンドル */
            #side-resize-handle {
                width: 5px;
                background: transparent;
                cursor: col-resize;
                flex-shrink: 0;
                position: relative;
                border-right: 1px solid #d0d3da;
                transition: background 0.15s;
                z-index: 20;
            }
            #side-resize-handle:hover,
            #side-resize-handle.dragging {
                background: rgba(74,124,220,0.25);
                border-right-color: #4a7cdc;
            }
            /* 折りたたみトグルボタン */
            #side-collapse-btn {
                position: absolute;
                top: 50%;
                right: -10px;
                transform: translateY(-50%);
                width: 16px;
                height: 36px;
                background: #e8ecf5;
                border: 1px solid #c0c8e0;
                border-radius: 0 4px 4px 0;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 9px;
                color: #555;
                z-index: 21;
                transition: background 0.13s;
                user-select: none;
            }
            #side-collapse-btn:hover {
                background: #cdd8f5;
                color: #1a3f8f;
            }

            .panel-sep {
                width: 44px;
                height: 1px;
                background: #d0d3da;
                margin: 6px 0;
            }

            /* 図形タイル */
            .shape-tile {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                width: 100%;
                padding: 6px 4px 4px;
                background: transparent;
                border: 1.5px solid transparent;
                border-radius: 6px;
                cursor: pointer;
                transition: background 0.13s, border-color 0.13s, box-shadow 0.13s;
                gap: 3px;
                box-sizing: border-box;
            }
            .shape-tile:hover {
                background: #e6eaf4;
                border-color: #4a7cdc;
                box-shadow: 0 1px 5px rgba(74,124,220,0.18);
            }
            .shape-tile:active {
                background: #d0daf5;
                border-color: #2c5cc5;
            }
            .shape-tile svg {
                display: block;
            }
            .shape-tile-label {
                font-size: 9px;
                color: #555;
                text-align: center;
                line-height: 1.2;
                white-space: nowrap;
            }
            .shape-tile:hover .shape-tile-label {
                color: #1a3f8f;
            }

            /* ===== キャンバスエリア ===== */
            #canvas-wrap {
                flex: 1;
                overflow: hidden;
                position: relative;
            }
            #canvas {
                width: 100%;
                height: 100%;
                display: block;
                background: #fff;
            }

            /* ===== アコーディオン ===== */
            .accordion-wrapper {
                display: inline-block;
                vertical-align: middle;
                position: relative;
            }
            .accordion-trigger {
                cursor: pointer;
                padding: 4px 10px;
                background: #fff;
                border: 1px solid #ccc;
                border-radius: 4px;
                font-size: 13px;
                user-select: none;
                color: #333;
            }
            .accordion-trigger::after      { content: ' ▾'; font-size: 10px; }
            .accordion-trigger.open::after { content: ' ▴'; }
            .accordion-menu {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                background: #fff;
                border: 1px solid #ccc;
                border-radius: 5px;
                box-shadow: 0 4px 16px rgba(0,0,0,0.13);
                z-index: 200;
                min-width: 130px;
                padding: 4px 0;
            }
            .accordion-menu.open { display: block; }
            .accordion-menu button,
            .accordion-menu label {
                display: block;
                width: 100%;
                padding: 7px 16px;
                text-align: left;
                background: none;
                border: none;
                cursor: pointer;
                font-size: 13px;
                white-space: nowrap;
                box-sizing: border-box;
                color: #222;
            }
            .accordion-menu button:hover,
            .accordion-menu label:hover { background: #f0f4ff; }

            /* ===== セパレータ ===== */
            .sep {
                width: 1px;
                height: 22px;
                background: #d0d3da;
                margin: 0 2px;
                flex-shrink: 0;
            }

            /* ===== エッジスタイルボタン ===== */
            .edge-btn {
                padding: 3px 8px;
                background: #fff;
                border: 1px solid #ccc;
                border-radius: 4px;
                font-size: 12px;
                cursor: pointer;
                white-space: nowrap;
                color: #333;
            }
            .edge-btn:hover   { background: #eef1fb; border-color: #4a7cdc; }
            .edge-btn.active  { background: #1976D2; color: #fff; border-color: #1565C0; }

            /* ===== エッジ選択パネル（画面下部） ===== */
            #edge-panel {
                display: none;
                position: fixed;
                bottom: 14px;
                left: calc(var(--side-w, 72px) + 5px + 50%);
                transform: translateX(-50%);
                background: #fff;
                border: 1px solid #bbb;
                border-radius: 8px;
                padding: 6px 14px;
                box-shadow: 0 4px 16px rgba(0,0,0,0.18);
                align-items: center;
                gap: 8px;
                font-size: 12px;
                z-index: 300;
                white-space: nowrap;
            }
            #edge-panel.visible { display: flex; }
            #edge-panel .ep-label { color: #666; font-size: 11px; }
            #edge-panel .edge-btn { font-size: 11px; padding: 2px 7px; }
            #ep-color { width: 26px; height: 22px; border: 1px solid #ccc; border-radius: 3px; cursor: pointer; padding: 0; }
            #ep-delete { background: #e53935; color: #fff; border-color: #e53935; }
            #ep-delete:hover { background: #c62828; }
        </style>
    </head>

    <body>
        <!-- ===== 上部ツールバー ===== -->
        <div id="toolbar">
            <!-- ファイルメニュー -->
            <div class="accordion-wrapper">
                <span class="accordion-trigger" id="file-menu-trigger">ファイル</span>
                <div class="accordion-menu" id="file-menu">
                    <button data-shape="save">保存</button>
                    <label for="load-input">ファイルを開く</label>
                </div>
            </div>
            <input type="file" id="load-input" accept=".json" style="display:none">

            <div class="sep"></div>

            <!-- 矢印スタイル -->
            <span style="font-size:12px;color:#555;">矢印:</span>
            <button class="edge-btn active" data-estyle="straight">直線</button>
            <button class="edge-btn"        data-estyle="bezier">曲線</button>
            <button class="edge-btn"        data-estyle="orthogonal">折れ線</button>

            <div class="sep"></div>

            <!-- 矢印種類 -->
            <span style="font-size:12px;color:#555;">種類:</span>
            <button class="edge-btn active" data-arrow="end">→ 終点</button>
            <button class="edge-btn"        data-arrow="both">↔ 両方</button>
            <button class="edge-btn"        data-arrow="none">― なし</button>

            <div class="sep"></div>

            <!-- 線種 -->
            <span style="font-size:12px;color:#555;">線:</span>
            <button class="edge-btn active" data-dash="solid">実線</button>
            <button class="edge-btn"        data-dash="dashed">破線</button>
            <button class="edge-btn"        data-dash="dotted">点線</button>

            <div class="sep"></div>

            <!-- 線色・太さ -->
            <span style="font-size:12px;color:#555;">色:</span>
            <input type="color" id="edge-color" value="#333333"
                   style="width:28px;height:24px;border:1px solid #ccc;border-radius:3px;cursor:pointer;padding:0;">
            <span style="font-size:12px;color:#555;">太さ:</span>
            <input type="range" id="edge-width" min="1" max="8" value="2" step="0.5" style="width:60px;">
            <span id="edge-width-value" style="font-size:12px;min-width:18px;">2</span>

            <div class="sep"></div>

            <!-- 文字サイズ -->
            <label style="font-size:12px;">文字:
                <input type="range" id="font-size-slider" min="8" max="36" value="14" step="1" style="width:70px;">
                <span id="font-size-value">14</span>px
            </label>
        </div><!-- #toolbar -->

        <!-- ===== ツールバー以下：サイドパネル＋キャンバス ===== -->
        <div id="main-area">

            <!-- 左サイドパネル（図形パレット） -->
            <div id="side-panel-wrapper">
                <div id="side-panel">
                <span class="panel-section-label">図形</span>

                <!-- 処理（矩形） -->
                <button class="shape-tile" data-shape="rect" title="処理">
                    <svg viewBox="0 0 48 32" width="48" height="32">
                        <rect x="3" y="3" width="42" height="26" rx="2" fill="#2196F3" stroke="#1565C0" stroke-width="1"/>
                        <text x="24" y="17" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="9" font-family="sans-serif"></text>
                    </svg>
                    <span class="shape-tile-label">処理</span>
                </button>

                <!-- 開始・終了（角丸） -->
                <button class="shape-tile" data-shape="rounded" title="開始・終了">
                    <svg viewBox="0 0 48 32" width="48" height="32">
                        <rect x="3" y="3" width="42" height="26" rx="13" fill="#4CAF50" stroke="#2e7d32" stroke-width="1"/>
                        <text x="24" y="17" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="7.5" font-family="sans-serif"></text>
                    </svg>
                    <span class="shape-tile-label">開始/終了</span>
                </button>

                <!-- 分岐・判断（菱形） -->
                <button class="shape-tile" data-shape="diamond" title="分岐・判断">
                    <svg viewBox="0 0 48 32" width="48" height="32">
                        <polygon points="24,2 46,16 24,30 2,16" fill="#FF9800" stroke="#e65100" stroke-width="1"/>
                        <text x="24" y="16" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="8" font-family="sans-serif"></text>
                    </svg>
                    <span class="shape-tile-label">分岐/判断</span>
                </button>

                <!-- 入出力（平行四辺形） -->
                <button class="shape-tile" data-shape="parallelogram" title="入出力">
                    <svg viewBox="0 0 48 32" width="48" height="32">
                        <polygon points="10,2 46,2 38,30 2,30" fill="#9C27B0" stroke="#4a148c" stroke-width="1"/>
                        <text x="24" y="17" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="8" font-family="sans-serif"></text>
                    </svg>
                    <span class="shape-tile-label">入出力</span>
                </button>

                <!-- データベース（シリンダー） -->
                <button class="shape-tile" data-shape="cylinder" title="データベース">
                    <svg viewBox="0 0 48 36" width="48" height="36">
                        <rect x="4" y="8" width="40" height="20" fill="#F44336"/>
                        <ellipse cx="24" cy="28" rx="20" ry="5" fill="#E57373"/>
                        <ellipse cx="24" cy="8"  rx="20" ry="5" fill="#EF9A9A"/>
                        <text x="24" y="19" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="9" font-family="sans-serif"></text>
                    </svg>
                    <span class="shape-tile-label">データベース</span>
                </button>

                </div><!-- #side-panel -->
                <div id="side-resize-handle">
                    <div id="side-collapse-btn" title="折りたたむ/開く">◀</div>
                </div>
            </div><!-- #side-panel-wrapper -->

            <!-- キャンバス -->
            <div id="canvas-wrap">
                <svg id="canvas"></svg>
            </div>

        </div><!-- #main-area -->

        <!-- 選択エッジ操作パネル -->
        <div id="edge-panel" onmousedown="event.stopPropagation()" onclick="event.stopPropagation()">
            <span class="ep-label">選択中の矢印 ▸</span>
            <span class="ep-label">スタイル:</span>
            <button class="edge-btn" id="ep-straight">直線</button>
            <button class="edge-btn" id="ep-bezier">曲線</button>
            <button class="edge-btn" id="ep-orthogonal">折れ線</button>
            <span class="ep-label">矢印:</span>
            <button class="edge-btn" id="ep-end">→</button>
            <button class="edge-btn" id="ep-both">↔</button>
            <button class="edge-btn" id="ep-none">―</button>
            <span class="ep-label">線種:</span>
            <button class="edge-btn" id="ep-solid">実線</button>
            <button class="edge-btn" id="ep-dashed">破線</button>
            <button class="edge-btn" id="ep-dotted">点線</button>
            <span class="ep-label">色:</span>
            <input type="color" id="ep-color" value="#333333">
            <button class="edge-btn" id="ep-delete" style="background:#e53935;color:#fff;border-color:#e53935;">削除</button>
        </div>

        <script>
            // ===== アコーディオン初期化 =====
            const accordions = [
                { triggerId: 'file-menu-trigger', menuId: 'file-menu' },
            ];
            accordions.forEach(({ triggerId, menuId }) => {
                const trigger = document.getElementById(triggerId);
                const menu    = document.getElementById(menuId);
                trigger.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const isOpen = menu.classList.toggle('open');
                    trigger.classList.toggle('open', isOpen);
                    accordions.forEach(({ triggerId: otherId, menuId: otherMenuId }) => {
                        if (otherId !== triggerId) {
                            document.getElementById(otherMenuId).classList.remove('open');
                            document.getElementById(otherId).classList.remove('open');
                        }
                    });
                });
            });
            document.addEventListener('click', () => {
                accordions.forEach(({ triggerId, menuId }) => {
                    document.getElementById(menuId).classList.remove('open');
                    document.getElementById(triggerId).classList.remove('open');
                });
            });

            // ===== サイドパネル リサイズ & 折りたたみ =====
            (function() {
                const panel      = document.getElementById('side-panel');
                const handle     = document.getElementById('side-resize-handle');
                const collapseBtn = document.getElementById('side-collapse-btn');
                const edgePanel  = document.getElementById('edge-panel');
                let dragging = false;
                let startX   = 0;
                let startW   = 0;
                let collapsed = false;
                let lastW    = 72; // 折りたたみ前の幅を記憶

                let prevPanelW = 72;

                function updateColumns(w) {
                    // 64px未満=1列, 128px未満=2列, 192px未満=3列, 以降+64pxごとに+1列
                    const cols = w < 64 ? 1 : Math.floor(w / 64);
                    panel.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
                }

                function setWidth(w) {
                    w = Math.max(0, Math.min(300, w));
                    const diff = w - prevPanelW;
                    prevPanelW = w;
                    panel.style.width = w + 'px';
                    document.documentElement.style.setProperty('--side-w', w + 'px');
                    updateColumns(w);
                    // サイドバー幅変化分だけviewXを補正してキャンバス内容をずらさない
                    if (typeof viewX !== 'undefined' && typeof applyTransform === 'function') {
                        viewX -= diff;
                        applyTransform();
                    }
                }

                function updateCollapseBtn() {
                    collapseBtn.textContent = collapsed ? '▶' : '◀';
                    collapseBtn.title = collapsed ? '開く' : '折りたたむ';
                }

                // ドラッグ開始
                handle.addEventListener('mousedown', (e) => {
                    if (e.target === collapseBtn) return;
                    dragging = true;
                    startX   = e.clientX;
                    startW   = panel.offsetWidth;
                    handle.classList.add('dragging');
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';
                    e.preventDefault();
                });

                window.addEventListener('mousemove', (e) => {
                    if (!dragging) return;
                    const newW = startW + (e.clientX - startX);
                    if (newW < 20) {
                        // 完全に折りたたむ
                        if (!collapsed) {
                            lastW = startW || 72;
                            collapsed = true;
                            panel.classList.add('collapsed');
                            setWidth(0);
                            updateCollapseBtn();
                        }
                    } else {
                        if (collapsed) {
                            collapsed = false;
                            panel.classList.remove('collapsed');
                            updateCollapseBtn();
                        }
                        setWidth(newW);
                        lastW = newW;
                    }
                });

                window.addEventListener('mouseup', () => {
                    if (!dragging) return;
                    dragging = false;
                    handle.classList.remove('dragging');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                });

                // 折りたたみボタン
                collapseBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (collapsed) {
                        collapsed = false;
                        panel.classList.remove('collapsed');
                        prevPanelW = 0;
                        setWidth(lastW || 72);
                    } else {
                        lastW = panel.offsetWidth || 72;
                        collapsed = true;
                        panel.classList.add('collapsed');
                        prevPanelW = lastW;
                        setWidth(0);
                    }
                    updateCollapseBtn();
                });

                // 初期CSS変数を設定
                document.documentElement.style.setProperty('--side-w', '72px');
                updateColumns(72);
            })();
        </script>

        <!-- 読み込み順序が依存関係を決定します。変更しないでください -->
        <script src="state.js"></script>    <!-- 1. グローバル状態 -->
        <script src="canvas.js"></script>   <!-- 2. SVG初期化・グリッド・座標変換 -->
        <script src="edge.js"></script>     <!-- 3. エッジ（nodeより先にロード） -->
        <script src="flownode.js"></script>     <!-- 4. ノード（edgeの関数を利用） -->
        <script src="viewport.js"></script> <!-- 5. パン・ズーム・矩形選択 -->
        <script src="toolbar.js"></script>  <!-- 6. ツールバーUI -->
        <script src="fileio.js"></script>   <!-- 7. 保存・読み込み -->
    </body>
</html>
